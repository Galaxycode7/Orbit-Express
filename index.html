<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: sans-serif; }
        .train-header { background-color: #f59e0b; color: white; }
        .train-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <header class="train-header p-5 text-xl font-bold shadow-lg">Where Is My Train</header>

    <main class="p-4">
        <input id="trainSearch" type="text" placeholder="Enter Station Code (e.g. NDLS)" 
               class="w-full p-4 rounded-lg border border-gray-300 outline-none mb-6 shadow-sm">
        
        <div id="resultCard" class="train-card p-6 hidden">
            <h2 id="trainName" class="text-2xl font-bold text-gray-800">Station Name</h2>
            <p id="trainStatus" class="text-md text-green-600 font-semibold mt-2">Status: Live and On Time</p>
            <div class="mt-4 border-t pt-4 text-gray-600 text-sm">
                <p>Platform: 4</p>
                <p>Delay: No delay</p>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('trainSearch').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('trainSearch').value.toUpperCase();
                const resultCard = document.getElementById('resultCard');
                const trainName = document.getElementById('trainName');
                
                if (input.length > 0) {
                    resultCard.classList.remove('hidden');
                    trainName.innerText = "Station: " + input;
                }
            }
        });
    </script>
</body>
</html>
