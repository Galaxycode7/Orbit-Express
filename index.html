<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(180deg, #1e3a8a 0%, #000000 100%); min-height: 100vh; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-glass { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="pb-24">
    <header class="p-6"><h1 class="text-2xl font-bold">RailPulse</h1></header>

    <main class="px-6">
        <input id="trainSearch" type="text" placeholder="Enter Station Code (e.g. NDLS)..." class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 outline-none mb-6">
        <div id="resultCard" class="glass-card p-6 rounded-3xl hidden">
            <h2 id="trainName" class="text-xl font-bold mb-2">Loading...</h2>
            <p id="trainStatus" class="text-sm opacity-60">Connecting...</p>
        </div>
    </main>

    <nav class="nav-glass fixed bottom-0 w-full p-4 flex justify-around rounded-t-3xl">
        <div class="text-center">🔍<br><span class="text-[10px]">Search</span></div>
        <div class="text-center">📍<br><span class="text-[10px]">Live Map</span></div>
        <div class="text-center">🎫<br><span class="text-[10px]">PNR</span></div>
        <div class="text-center">🏢<br><span class="text-[10px]">Station</span></div>
    </nav>

    <script>
        async function fetchData() {
            const stationCode = document.getElementById('trainSearch').value || 'NDLS';
            const url = `https://irctc1.p.rapidapi.com/api/v3/getLiveStation?hours=1`;
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': 'b1c8f688cemsh1840255211fda8cp11ede5jsn929bd47627b2',
                    'x-rapidapi-host': 'irctc1.p.rapidapi.com'
                }
            };
            
            document.getElementById('resultCard').classList.remove('hidden');
            document.getElementById('trainName').innerText = "Fetching...";
            
            try {
                const response = await fetch(url, options);
                const data = await response.json();
                document.getElementById('trainName').innerText = data.data.station_name;
                document.getElementById('trainStatus').innerText = "Status: Live Data Loaded";
            } catch (err) {
                document.getElementById('trainStatus').innerText = "Error: Could not load data.";
            }
        }

        document.getElementById('trainSearch').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fetchData();
        });
    </script>
</body>
</html>
