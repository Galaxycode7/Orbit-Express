    <script>
        async function fetchData() {
            const input = document.getElementById('trainSearch').value || 'NDLS';
            // We use the input directly in the URL if the API supports it
            const url = `https://irctc1.p.rapidapi.com/api/v3/getLiveStation?stationCode=${input}&hours=1`;
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': 'b1c8f688cemsh1840255211fda8cp11ede5jsn929bd47627b2',
                    'x-rapidapi-host': 'irctc1.p.rapidapi.com'
                }
            };
            
            document.getElementById('resultCard').classList.remove('hidden');
            document.getElementById('trainName').innerText = "Searching...";
            
            try {
                const response = await fetch(url, options);
                const data = await response.json();
                
                // If the API returns success, show the name
                if (data && data.data) {
                    document.getElementById('trainName').innerText = data.data.station_name || "Station Found";
                    document.getElementById('trainStatus').innerText = "Live Data Loaded";
                } else {
                    document.getElementById('trainName').innerText = "No data found";
                    document.getElementById('trainStatus').innerText = "Check your station code";
                }
            } catch (err) {
                document.getElementById('trainStatus').innerText = "Error: Check connection.";
            }
        }

        document.getElementById('trainSearch').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fetchData();
        });
    </script>
