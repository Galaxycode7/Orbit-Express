<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit-Express | Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-sky-400 tracking-tighter">ORBIT EXPRESS</h1>
        </header>

        <div class="glass p-6 rounded-2xl">
            <input id="trainNum" type="text" placeholder="Enter Train Number..." class="w-full bg-black/50 border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-sky-500">
            <button id="searchBtn" class="w-full bg-sky-600 text-white py-3 rounded-xl hover:bg-sky-500 transition">INITIATE SCAN</button>
            
            <div id="result" class="mt-6 p-4 rounded-xl bg-sky-950/20 border border-sky-500/20 hidden">
                <p id="status" class="text-sky-300 text-sm font-mono"></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('searchBtn').onclick = async () => {
            const trainNum = document.getElementById('trainNum').value;
            const resDiv = document.getElementById('result');
            const status = document.getElementById('status');

            if (!trainNum) return alert("Enter a train number first!");

            resDiv.classList.remove('hidden');
            status.innerText = "CONNECTING TO SATELLITE... FETCHING DATA FOR #" + trainNum;

            // This is where the 'Logic' happens
            setTimeout(() => {
                status.innerText = "STATUS: Train #" + trainNum + " is ON TIME. \nCurrent Position: 45km from destination.";
            }, 2000);
        };
    </script>
</body>
</html>
