 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit-Express | Rail Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a, #000); color: white; font-family: sans-serif; min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-lg mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-sky-400">RailPulse</h1>
        
        <input type="text" placeholder="Search train or station..." class="w-full p-4 rounded-2xl bg-white/10 border border-white/10 mb-6 focus:ring-2 focus:ring-sky-500 outline-none">

        <div class="card p-6 rounded-3xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Venad Express</h2>
                <span class="text-green-400 text-sm font-bold bg-green-400/10 px-3 py-1 rounded-full">ON TIME</span>
            </div>
            <div class="flex justify-between text-gray-400 text-sm">
                <span>05:45 TVC</span>
                <span>12:50 SRR</span>
            </div>
            <div class="h-2 w-full bg-black/30 rounded-full mt-4 overflow-hidden">
                <div class="h-full bg-sky-500 w-3/4"></div>
            </div>
        </div>
    </div>
</body>
</html>
