<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%); 
            min-height: 100vh; 
            color: white; 
            font-family: 'Inter', sans-serif; 
        }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; 
        }
        .nav-glass { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid rgba(255, 255, 255, 0.1); 
        }
    </style>
</head>
<body class="pb-24">
    <header class="p-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tight">RailPulse</h1>
        <span class="text-xs bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-full border border-cyan-500/30">EN</span>
    </header>

    <main class="px-6 space-y-6">
        <div class="glass-panel p-6">
            <h2 class="text-lg font-medium mb-4">Track any Indian Railways train, <span class="text-cyan-400">live.</span></h2>
            <div class="space-y-4">
                <input type="text" placeholder="From Station (e.g. ERS)" class="w-full bg-black/20 border border-white/10 rounded-xl p-4 outline-none">
                <input type="text" placeholder="To Station (e.g. KTYM)" class="w-full bg-black/20 border border-white/10 rounded-xl p-4 outline-none">
                <button class="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-xl font-bold transition-all">FIND TRAINS</button>
            </div>
        </div>

        <div class="glass-panel p-6">
            <h3 class="text-sm font-semibold opacity-60 mb-2">LIVE STATION BOARD</h3>
            <p class="text-xl">Airport-style <span class="text-cyan-400">arrivals & departures</span></p>
        </div>
    </main>

    <nav class="nav-glass fixed bottom-0 w-full p-4 flex justify-around items-center">
        <div class="flex flex-col items-center text-cyan-400"><span class="text-xl">🔍</span><span class="text-[10px]">Search</span></div>
        <div class="flex flex-col items-center opacity-50"><span class="text-xl">📍</span><span class="text-[10px]">Live Map</span></div>
        <div class="flex flex-col items-center opacity-50"><span class="text-xl">🎫</span><span class="text-[10px]">PNR</span></div>
        <div class="flex flex-col items-center opacity-50"><span class="text-xl">🏢</span><span class="text-[10px]">Station</span></div>
    </nav>
</body>
</html>
